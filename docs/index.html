<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echo AI Pro Code</title>
<style>
body{font-family:sans-serif;margin:0;padding:0;background:#f0f0f0;}
#container{padding:20px;}
textarea{width:100%;height:120px;font-family:monospace;font-size:14px;}
button{padding:10px 20px;margin-top:10px;}
iframe{width:100%;height:400px;border:1px solid #ccc;margin-top:10px;}
</style>
</head>
<body>
<div id="container">
<h1>Echo AI Pro Code</h1>
<textarea id="prompt" placeholder="Enter prompt for AI..."></textarea>
<br>
<button id="generate">Generate Webpage</button>
<iframe id="preview"></iframe>
</div>
<script>
document.getElementById('generate').onclick = async () => {
    const prompt = document.getElementById('prompt').value;
    const res = await fetch('http://localhost:8000/generate', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt})
    });
    const data = await res.json();
    const iframe = document.getElementById('preview');
    iframe.srcdoc = data.code;
}
</script>
</body>
</html>
